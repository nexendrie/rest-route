include:
    -   template: Jobs/Secret-Detection.gitlab-ci.yml

stages:
    - test
    - announce

.test_job: &test_job
    stage: test
    script:
        - phing test
    cache:
        paths:
            - vendor/
    before_script:
        - composer update --prefer-dist --no-progress --no-interaction
    rules:
        - if: $CI_COMMIT_BRANCH

test:php8.3:
    <<: *test_job
    image: nexendrie/php:8.3

test:php8.4:
    <<: *test_job
    image: nexendrie/php:8.4

test:reports:
    extends:
        - .test_job
    image: nexendrie/php:8.3
    variables:
        REPORTS: 1
    coverage: '/^\s*Lines:\s*\d+.\d+\%/'
    artifacts:
        paths:
            - coverage.xml
            - junit.xml
        reports:
            coverage_report:
                coverage_format: cobertura
                path: coverage.xml
            junit: junit.xml

announce:gitlab:
    stage: announce
    image: registry.gitlab.com/gitlab-org/release-cli:latest
    rules:
        - if: $CI_COMMIT_TAG
    script:
        - echo "Creating GitLab release"
    release:
        tag_name: $CI_COMMIT_TAG
        name: "Rest Route $CI_COMMIT_TAG"
        description: "./RELEASE_NOTES"
